const PRIORITY_COLORS = {
  1: "#e74c3c",
  2: "#e67e22",
  3: "#f39c12",
  4: "#3498db",
  5: "#95a5a6",
};

const PRIORITY_NAMES = {
  1: "CRITICAL",
  2: "HIGH",
  3: "MEDIUM",
  4: "LOW",
  5: "INFO",
};

const PARENT_COLOR = "#6ba3d6";
const ROOT_COLOR = "#3a7bd5";

function getColor(node) {
  if (node.id === "root") return ROOT_COLOR;
  if (node.priority != null) return PRIORITY_COLORS[node.priority] || "#95a5a6";
  return PARENT_COLOR;
}

function textWidth(text, fontSize) {
  return text.length * fontSize * 0.55 + 12;
}

function InfoPanel({ node, position, onClose, isDark }) {
  if (!node || !node.desc) return null;

  const color = getColor(node);
  const pName = node.priority != null ? PRIORITY_NAMES[node.priority] : "VARIES";
  const pColor = node.priority != null ? PRIORITY_COLORS[node.priority] : "#a78bfa";

  const bgColor = isDark ? "#1e1e2e" : "#ffffff";
  const borderColor = isDark ? "#333" : "#e0e0e0";
  const titleColor = isDark ? "#eee" : "#222";
  const bodyColor = isDark ? "#ccc" : "#444";
  const footerColor = isDark ? "#666" : "#bbb";

  const maxX = typeof window !== "undefined" ? window.innerWidth - 350 : 500;
  const left = Math.max(8, Math.min(position.x, maxX));
  const top = Math.max(48, position.y);

  return (
    <div
      onClick={(e) => e.stopPropagation()}
      style={{
        position: "absolute",
        left: left,
        top: top,
        width: 320,
        background: bgColor,
        border: "1px solid " + borderColor,
        borderRadius: 10,
        zIndex: 100,
        overflow: "hidden",
        boxShadow: isDark
          ? "0 8px 32px rgba(0,0,0,0.5)"
          : "0 8px 32px rgba(0,0,0,0.12)",
        fontFamily: "'IBM Plex Sans', sans-serif",
        animation: "panelFade 0.15s ease-out",
      }}
    >
      <div
        style={{
          padding: "10px 14px",
          background: color + (isDark ? "18" : "0a"),
          borderBottom: "1px solid " + (isDark ? "#333" : "#f0f0f0"),
          display: "flex",
          alignItems: "flex-start",
          gap: 10,
        }}
      >
        <div
          style={{
            width: 10,
            height: 10,
            borderRadius: "50%",
            background: color,
            marginTop: 4,
            flexShrink: 0,
            boxShadow: "0 0 8px " + color + "66",
          }}
        />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: titleColor, lineHeight: 1.3 }}>
            {node.name}
          </div>
          <div
            style={{
              display: "inline-block",
              marginTop: 4,
              padding: "1px 8px",
              fontSize: 10,
              fontWeight: 700,
              fontFamily: "'IBM Plex Mono', monospace",
              letterSpacing: 1,
              color: pColor,
              background: pColor + "18",
              borderRadius: 3,
              border: "1px solid " + pColor + "33",
            }}
          >
            {pName}
          </div>
        </div>
        <button
          onClick={onClose}
          style={{
            background: "none",
            border: "none",
            cursor: "pointer",
            fontSize: 18,
            color: isDark ? "#666" : "#ccc",
            padding: "0 4px",
            lineHeight: 1,
          }}
        >
          x
        </button>
      </div>
      <div
        style={{
          padding: "12px 14px",
          fontSize: 13,
          lineHeight: 1.7,
          color: bodyColor,
          maxHeight: 220,
          overflowY: "auto",
        }}
      >
        {node.desc}
      </div>
      <div
        style={{
          padding: "6px 14px 8px",
          borderTop: "1px solid " + (isDark ? "#2a2a3a" : "#f5f5f5"),
          fontSize: 10,
          color: footerColor,
          fontFamily: "'IBM Plex Mono', monospace",
        }}
      >
        {node.children && node.children.length > 0
          ? node.children.length + " sub-categories"
          : "Leaf node"}
      </div>
    </div>
  );
}

function VRTMindMap() {
  const containerRef = useRef(null);
  const touchRef = useRef(null);

  const [isDark, setIsDark] = useState(false);
  const [expanded, setExpanded] = useState(new Set(["root"]));
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [zoom, setZoom] = useState(0.82);
  const [dragging, setDragging] = useState(false);
  const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
  const [hovered, setHovered] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [infoPos, setInfoPos] = useState({ x: 0, y: 0 });
  const [search, setSearch] = useState("");

  const toggleNode = useCallback((id) => {
    setExpanded((prev) => {
      const next = new Set(prev);
      if (next.has(id)) {
        next.delete(id);
      } else {
        next.add(id);
      }
      return next;
    });
  }, []);

  const expandAll = () => {
    const s = new Set();
    const walk = (n) => {
      if (n.children && n.children.length > 0) {
        s.add(n.id);
        n.children.forEach(walk);
      }
    };
    walk(VRT);
    setExpanded(s);
  };

  const collapseAll = () => {
    setExpanded(new Set(["root"]));
    setSelectedId(null);
  };

  const searchMatches = useMemo(() => {
    if (!search.trim()) return new Set();
    const m = new Set();
    const term = search.toLowerCase();
    const walk = (n) => {
      if (
        n.name.toLowerCase().includes(term) ||
        (n.desc && n.desc.toLowerCase().includes(term))
      ) {
        m.add(n.id);
      }
      (n.children || []).forEach(walk);
    };
    walk(VRT);
    return m;
  }, [search]);

  // LAYOUT: Root on left-center, all branches fan out to the right
  const layout = useMemo(() => {
    const nodes = [];
    const edges = [];
    const ROW_H = 28;
    const COL_W = 230;

    const countRows = (node) => {
      if (!expanded.has(node.id) || !node.children || node.children.length === 0) {
        return 1;
      }
      return node.children.reduce((sum, c) => sum + countRows(c), 0);
    };

    const totalRows = countRows(VRT);
    const totalH = totalRows * ROW_H;

    const layoutNode = (node, depth, yStart, yEnd, parentEntry) => {
      const midY = (yStart + yEnd) / 2;
      const x = depth * COL_W;
      const hasKids = node.children && node.children.length > 0;
      const isExp = expanded.has(node.id);

      const entry = {
        x: x,
        y: midY,
        node: node,
        isExp: isExp,
        hasKids: hasKids,
        depth: depth,
      };
      nodes.push(entry);

      if (parentEntry) {
        edges.push({ from: parentEntry, to: entry });
      }

      if (isExp && hasKids) {
        const childRowCounts = node.children.map((c) => countRows(c));
        const totalChildRows = childRowCounts.reduce((a, b) => a + b, 0);
        let curY = yStart;

        node.children.forEach((child, i) => {
          const span = (childRowCounts[i] / totalChildRows) * (yEnd - yStart);
          layoutNode(child, depth + 1, curY, curY + span, entry);
          curY += span;
        });
      }
    };

    layoutNode(VRT, 0, -totalH / 2, totalH / 2, null);
    return { nodes: nodes, edges: edges };
  }, [expanded]);

  // Center view on mount
  useEffect(() => {
    if (containerRef.current) {
      const rect = containerRef.current.getBoundingClientRect();
      setPan({ x: 80, y: rect.height / 2 });
    }
  }, []);

  // Wheel zoom
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const handler = (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.05 : 0.05;
      setZoom((z) => Math.max(0.12, Math.min(3, z + delta)));
    };
    el.addEventListener("wheel", handler, { passive: false });
    return () => el.removeEventListener("wheel", handler);
  }, []);

  const findNode = (id, node) => {
    if (!node) node = VRT;
    if (node.id === id) return node;
    for (const c of node.children || []) {
      const found = findNode(id, c);
      if (found) return found;
    }
    return null;
  };

  const handleNodeClick = (e, pos) => {
    e.stopPropagation();
    if (pos.hasKids) {
      toggleNode(pos.node.id);
    }
    setSelectedId(null);
  };

  const selectedNode = selectedId ? findNode(selectedId) : null;

  // Theme colors
  const bgColor = isDark ? "#121218" : "#f7f8fa";
  const lineColor = isDark ? "#333" : "#d0d4da";
  const textColor = isDark ? "#bbb" : "#555";
  const textHighlight = isDark ? "#eee" : "#111";
  const matchBg = isDark ? "#2a2a1a" : "#fffbeb";
  const matchBorder = isDark ? "#886600" : "#fbbf24";
  const hoverBg = isDark ? "#1a2a3a" : "#f0f7ff";
  const selectBg = isDark ? "#1a2440" : "#e8f0fe";
  const headerBg = isDark ? "#1a1a24" : "#ffffff";
  const headerBorder = isDark ? "#2a2a3a" : "#eaeaea";

  const btnStyle = {
    padding: "5px 12px",
    fontSize: 12,
    fontWeight: 600,
    fontFamily: "'IBM Plex Sans', sans-serif",
    color: isDark ? "#999" : "#666",
    background: isDark ? "#1e1e2e" : "#fafafa",
    border: "1px solid " + (isDark ? "#333" : "#ddd"),
    borderRadius: 5,
    cursor: "pointer",
  };

  const zoomBtnStyle = {
    width: 28,
    height: 28,
    fontSize: 16,
    fontWeight: 600,
    color: isDark ? "#999" : "#666",
    background: isDark ? "#1e1e2e" : "#fff",
    border: "1px solid " + (isDark ? "#333" : "#ddd"),
    borderRadius: 5,
    cursor: "pointer",
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
  };

  return (
    <div
      style={{
        width: "100%",
        height: "100vh",
        background: bgColor,
        fontFamily: "'IBM Plex Sans', sans-serif",
        display: "flex",
        flexDirection: "column",
        overflow: "hidden",
        transition: "background 0.3s",
      }}
    >
      <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
      <style>
        {
          "@keyframes panelFade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}" +
          "::-webkit-scrollbar{width:4px}" +
          "::-webkit-scrollbar-thumb{background:" + (isDark ? "#444" : "#ddd") + ";border-radius:2px}"
        }
      </style>

      {/* HEADER */}
      <div
        style={{
          display: "flex",
          alignItems: "center",
          gap: 12,
          padding: "8px 16px",
          background: headerBg,
          borderBottom: "1px solid " + headerBorder,
          zIndex: 20,
          flexWrap: "wrap",
          flexShrink: 0,
          transition: "background 0.3s",
        }}
      >
        <div style={{ lineHeight: 1.2 }}>
          <div style={{ fontSize: 16, fontWeight: 700, color: isDark ? "#eee" : "#222" }}>
            Bugcrowd VRT
          </div>
          <div
            style={{
              fontSize: 11,
              color: isDark ? "#666" : "#aaa",
              fontFamily: "'IBM Plex Mono', monospace",
            }}
          >
            Vulnerability Rating Taxonomy · Developed by{" "}
            <span style={{ color: ROOT_COLOR, fontWeight: 600 }}>roshanxcvi</span>
          </div>
        </div>

        <div style={{ flex: 1, minWidth: 120, maxWidth: 220 }}>
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Search vulnerabilities..."
            style={{
              width: "100%",
              padding: "6px 12px",
              border: "1px solid " + (isDark ? "#333" : "#ddd"),
              borderRadius: 6,
              fontSize: 13,
              fontFamily: "'IBM Plex Mono', monospace",
              background: isDark ? "#1e1e2e" : "#fafafa",
              outline: "none",
              color: isDark ? "#ddd" : "#333",
              transition: "background 0.3s",
            }}
          />
        </div>

        <button onClick={expandAll} style={btnStyle}>Expand All</button>
        <button onClick={collapseAll} style={btnStyle}>Collapse</button>
        <button
          onClick={() => {
            setZoom(0.82);
            if (containerRef.current) {
              const r = containerRef.current.getBoundingClientRect();
              setPan({ x: 80, y: r.height / 2 });
            }
          }}
          style={btnStyle}
        >
          Reset
        </button>

        {/* DARK MODE TOGGLE */}
        <div
          onClick={() => setIsDark(!isDark)}
          style={{
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            gap: 6,
            padding: "4px 12px",
            borderRadius: 20,
            background: isDark ? "#2a2a3a" : "#f0f0f0",
            border: "1px solid " + (isDark ? "#444" : "#ddd"),
            transition: "all 0.3s",
            userSelect: "none",
          }}
        >
          <span style={{ fontSize: 13 }}>{isDark ? "\u{1F319}" : "\u{2600}\u{FE0F}"}</span>
          <span
            style={{
              fontSize: 12,
              fontWeight: 600,
              color: isDark ? "#aaa" : "#666",
              fontFamily: "'IBM Plex Mono', monospace",
            }}
          >
            {isDark ? "Dark" : "Light"}
          </span>
        </div>

        {/* LEGEND */}
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginLeft: "auto", flexWrap: "wrap" }}>
          {[
            [1, "P1", "#e74c3c"],
            [2, "P2", "#e67e22"],
            [3, "P3", "#f39c12"],
            [4, "P4", "#3498db"],
            [5, "P5", "#95a5a6"],
          ].map(function (item) {
            return (
              <div key={item[0]} style={{ display: "flex", alignItems: "center", gap: 2 }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: item[2] }} />
                <span
                  style={{
                    fontSize: 11,
                    color: isDark ? "#777" : "#888",
                    fontFamily: "'IBM Plex Mono', monospace",
                  }}
                >
                  {item[1]}
                </span>
              </div>
            );
          })}
        </div>
      </div>

      {/* SVG CANVAS */}
      <div
        ref={containerRef}
        style={{
          flex: 1,
          cursor: dragging ? "grabbing" : "grab",
          overflow: "hidden",
          position: "relative",
        }}
        onMouseDown={(e) => {
          if (e.button === 0) {
            setDragging(true);
            setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
          }
        }}
        onMouseMove={(e) => {
          if (dragging) {
            setPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
          }
        }}
        onMouseUp={() => setDragging(false)}
        onMouseLeave={() => setDragging(false)}
        onTouchStart={(e) => {
          if (e.touches.length === 1) {
            touchRef.current = {
              x: e.touches[0].clientX - pan.x,
              y: e.touches[0].clientY - pan.y,
            };
          }
        }}
        onTouchMove={(e) => {
          if (e.touches.length === 1 && touchRef.current) {
            setPan({
              x: e.touches[0].clientX - touchRef.current.x,
              y: e.touches[0].clientY - touchRef.current.y,
            });
          }
        }}
        onTouchEnd={() => {
          touchRef.current = null;
        }}
        onClick={() => setSelectedId(null)}
      >
        <svg width="100%" height="100%" style={{ display: "block" }}>
          <defs>
            <filter id="nodeGlow">
              <feGaussianBlur stdDeviation="2.5" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <rect width="100%" height="100%" fill={bgColor} />
          <g transform={"translate(" + pan.x + "," + pan.y + ") scale(" + zoom + ")"}>
            {/* EDGES */}
            {layout.edges.map(function (edge, idx) {
              var dx = edge.to.x - edge.from.x;
              var d =
                "M" + edge.from.x + "," + edge.from.y +
                " C" + (edge.from.x + dx * 0.5) + "," + edge.from.y +
                " " + (edge.to.x - dx * 0.5) + "," + edge.to.y +
                " " + edge.to.x + "," + edge.to.y;
              return (
                <path
                  key={idx}
                  d={d}
                  fill="none"
                  stroke={lineColor}
                  strokeWidth={1}
                  opacity={0.7}
                />
              );
            })}

            {/* NODES */}
            {layout.nodes.map(function (pos) {
              var node = pos.node;
              var isRoot = node.id === "root";
              var color = getColor(node);
              var isMatch = searchMatches.has(node.id);
              var isHov = hovered === node.id;
              var isSel = selectedId === node.id;
              var fontSize = isRoot ? 0 : pos.depth === 1 ? 14 : pos.depth === 2 ? 12.5 : 11.5;
              var tw = isRoot ? 0 : textWidth(node.name, fontSize);
              var circleR = isRoot ? 12 : pos.depth === 1 ? 6 : 5;

              return (
                <g
                  key={node.id}
                  transform={"translate(" + pos.x + "," + pos.y + ")"}
                  style={{ cursor: "pointer" }}
                  onClick={function (e) { handleNodeClick(e, pos); }}
                  onMouseEnter={function () { setHovered(node.id); }}
                  onMouseLeave={function () { setHovered(null); }}
                >
                  {/* Highlight backgrounds */}
                  {!isRoot && isMatch && (
                    <rect x={12} y={-10} width={tw + 8} height={20} rx={4} fill={matchBg} stroke={matchBorder} strokeWidth={1} />
                  )}
                  {!isRoot && (isHov || isSel) && !isMatch && (
                    <rect x={12} y={-10} width={tw + 8} height={20} rx={4} fill={isSel ? selectBg : hoverBg} stroke={isSel ? ROOT_COLOR + "44" : "none"} strokeWidth={isSel ? 1 : 0} />
                  )}

                  {/* Circle */}
                  <circle
                    cx={0}
                    cy={0}
                    r={circleR}
                    fill={color}
                    stroke={isDark ? "#222" : "#fff"}
                    strokeWidth={isRoot ? 3 : 1.5}
                    filter={(isHov || isSel) ? "url(#nodeGlow)" : undefined}
                  />

                  {/* +/- */}
                  {pos.hasKids && !isRoot && (
                    <text x={0} y={2.5} textAnchor="middle" fill="#fff" fontSize={7} fontWeight={700} style={{ pointerEvents: "none" }}>
                      {pos.isExp ? "\u2212" : "+"}
                    </text>
                  )}

                  {/* Root label */}
                  {isRoot && (
                    <g>
                      <text x={0} y={-22} textAnchor="middle" fill={isDark ? "#eee" : "#222"} fontSize={17} fontWeight={700} fontFamily="'IBM Plex Sans', sans-serif" style={{ pointerEvents: "none" }}>
                        Bugcrowd VRT
                      </text>
                      <text x={0} y={26} textAnchor="middle" fill={isDark ? "#555" : "#aaa"} fontSize={10} fontFamily="'IBM Plex Mono', monospace" style={{ pointerEvents: "none" }}>
                        click to explore
                      </text>
                    </g>
                  )}

                  {/* Branch label */}
                  {!isRoot && (
                    <text
                      x={14}
                      y={4}
                      fill={isSel ? textHighlight : isHov ? textHighlight : textColor}
                      fontSize={fontSize}
                      fontWeight={pos.depth === 1 ? 600 : 400}
                      fontFamily="'IBM Plex Sans', sans-serif"
                      style={{ pointerEvents: "none", userSelect: "none" }}
                    >
                      {node.name}
                    </text>
                  )}

                  {/* Priority badge */}
                  {!isRoot && node.priority != null && (
                    <g transform={"translate(" + (tw + 14) + ",-6)"}>
                      <circle cx={6} cy={6} r={6} fill={PRIORITY_COLORS[node.priority]} opacity={isDark ? 0.25 : 0.18} />
                      <text x={6} y={9} textAnchor="middle" fill={PRIORITY_COLORS[node.priority]} fontSize={7.5} fontWeight={700} fontFamily="'IBM Plex Mono', monospace" style={{ pointerEvents: "none" }}>
                        {node.priority}
                      </text>
                    </g>
                  )}

                  {/* Info button - click to show details */}
                  {!isRoot && node.desc && (
                    <g
                      transform={"translate(" + (tw + (node.priority != null ? 28 : 14)) + ",-7)"}
                      style={{ cursor: "pointer" }}
                      onClick={function (e) {
                        e.stopPropagation();
                        var rect = containerRef.current.getBoundingClientRect();
                        setInfoPos({
                          x: pos.x * zoom + pan.x + 30,
                          y: pos.y * zoom + pan.y - 10,
                        });
                        setSelectedId(node.id === selectedId ? null : node.id);
                      }}
                    >
                      <circle cx={8} cy={8} r={8} fill={isDark ? "#2a2a3a" : "#e8edf2"} stroke={isDark ? "#555" : "#b0bec5"} strokeWidth={1} />
                      <text x={8} y={12} textAnchor="middle" fill={isDark ? "#aaa" : "#607d8b"} fontSize={10} fontWeight={700} fontFamily="'IBM Plex Mono', monospace" style={{ pointerEvents: "none" }}>
                        i
                      </text>
                    </g>
                  )}
                </g>
              );
            })}
          </g>
        </svg>

        {/* INFO PANEL */}
        {selectedNode && (
          <InfoPanel
            node={selectedNode}
            position={infoPos}
            onClose={function () { setSelectedId(null); }}
            isDark={isDark}
          />
        )}

        {/* ZOOM CONTROLS */}
        <div style={{ position: "absolute", bottom: 14, right: 14, display: "flex", flexDirection: "column", gap: 3, zIndex: 5 }}>
          <button onClick={function () { setZoom(function (z) { return Math.min(3, z + 0.15); }); }} style={zoomBtnStyle}>
            +
          </button>
          <div
            style={{
              textAlign: "center",
              fontSize: 9,
              color: isDark ? "#666" : "#aaa",
              fontFamily: "'IBM Plex Mono', monospace",
              background: isDark ? "#1e1e2e" : "#fff",
              padding: "2px 4px",
              borderRadius: 3,
              border: "1px solid " + (isDark ? "#333" : "#e0e0e0"),
            }}
          >
            {Math.round(zoom * 100)}%
          </div>
          <button onClick={function () { setZoom(function (z) { return Math.max(0.12, z - 0.15); }); }} style={zoomBtnStyle}>
            -
          </button>
        </div>

        {/* HELP TEXT */}
        <div
          style={{
            position: "absolute",
            bottom: 14,
            left: 14,
            fontSize: 11,
            color: isDark ? "#555" : "#bbb",
            fontFamily: "'IBM Plex Mono', monospace",
            background: isDark ? "rgba(18,18,24,0.9)" : "rgba(255,255,255,0.9)",
            padding: "4px 8px",
            borderRadius: 4,
            border: "1px solid " + (isDark ? "#2a2a3a" : "#eee"),
          }}
        >
          Scroll to zoom - Drag to pan - Click (i) for details
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(VRTMindMap));
  </script>
</body>
</html>
